services:
  - type: web
    name: cybercraft-back
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn cybercraft.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: REDIS_URL
        fromService:
          name: cybercraft-redis
          type: redis
          property: connectionString

  - type: worker
    name: cybercraft-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A cybercraft worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: cybercraft-back
          type: web
          property: envVar
          envVarName: SECRET_KEY
      - key: DATABASE_URL
        fromService:
          name: cybercraft-db
          type: database
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cybercraft-redis
          type: redis
          property: connectionString

  - type: redis
    name: cybercraft-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: cybercraft-db
    plan: free
